<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trip Planner</title>
    <link rel="stylesheet" href="styles.css?v=20260613-4">
  </head>
  <body>
    <section id="loginScreen" class="login-screen" aria-label="Trip planner login">
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Family planner</p>
        <h1>Trip Planner</h1>
        <label>
          Username
          <input id="loginUsername" type="text" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="loginPassword" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button" type="submit">Log in</button>
        <p id="loginStatus" class="cloud-status" aria-live="polite"></p>
      </form>
    </section>

    <main class="app-shell">
      <section class="planner-frame" aria-label="Sydney visa trip calendar planner">
        <aside class="vertical-title">
          <span id="rangeTitle">Jul-Aug 2026</span>
        </aside>

        <section class="planner-main">
          <header class="topbar">
            <div>
              <p class="eyebrow">Philadelphia to Sydney</p>
              <h1>Sydney Visa Trip Planner</h1>
            </div>
            <div class="topbar-actions">
              <button id="newTripBtn" class="ghost-button" type="button">New trip</button>
              <button id="addEventBtn" class="primary-button" type="button">Add item</button>
              <button id="saveBtn" class="ghost-button" type="button">Save</button>
              <button id="undoBtn" class="ghost-button" type="button">Undo</button>
              <button id="signOutBtn" class="ghost-button" type="button">Sign out</button>
            </div>
          </header>

          <section class="controls" aria-label="Trip settings">
            <label>
              Trip
              <select id="tripSelect"></select>
            </label>
            <label>
              Trip starts
              <input id="startDate" type="date">
            </label>
            <label>
              Mark until
              <input id="endDate" type="date">
            </label>
            <label>
              Show
              <select id="categoryFilter">
                <option value="all">All categories</option>
              </select>
            </label>
          </section>

          <p id="cloudStatus" class="cloud-status" aria-live="polite">Loading shared plan...</p>

          <section class="category-strip" aria-label="Planner categories">
            <div id="categoryStrip" class="category-list"></div>
            <button id="addCategoryBtn" class="plain-button" type="button">New category</button>
          </section>

          <section class="calendar-wrap">
            <div class="weekday-row" aria-hidden="true">
              <span>Monday</span>
              <span>Tuesday</span>
              <span>Wednesday</span>
              <span>Thursday</span>
              <span>Friday</span>
              <span>Saturday</span>
              <span>Sunday</span>
            </div>
            <div id="calendarGrid" class="calendar-grid" aria-live="polite"></div>
          </section>
        </section>
      </section>
    </main>

    <dialog id="eventDialog" class="event-dialog">
      <form id="eventForm" method="dialog">
        <header>
          <h2 id="dialogTitle">Add item</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Close">x</button>
        </header>

        <input id="eventId" type="hidden">
        <label>
          Title
          <input id="eventTitle" type="text" required maxlength="80" placeholder="Visa appointment, family lunch...">
        </label>
        <div class="form-grid">
          <label>
            Starts
            <input id="eventStartDate" type="date" required>
          </label>
          <label>
            Ends
            <input id="eventEndDate" type="date" required>
          </label>
        </div>
        <div class="form-grid">
          <label>
            Category
            <select id="eventCategory" required></select>
          </label>
          <label>
            Time
            <input id="eventTime" type="text" maxlength="24" placeholder="10:30 AM">
          </label>
        </div>
        <div class="form-grid single-field">
          <label>
            Location
            <input id="eventLocation" type="text" maxlength="80" placeholder="Sydney CBD">
          </label>
        </div>
        <label>
          Notes
          <textarea id="eventNotes" rows="4" maxlength="280" placeholder="Confirmation numbers, who is going, packing reminders..."></textarea>
        </label>

        <menu class="dialog-actions">
          <button id="deleteEventBtn" class="danger-button" type="button">Delete</button>
          <span></span>
          <button class="ghost-button" value="cancel" type="submit">Cancel</button>
          <button id="saveEventBtn" class="primary-button" value="default" type="submit">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js?v=20260613-4"></script>
  </body>
</html>
